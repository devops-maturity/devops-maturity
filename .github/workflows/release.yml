
name: Release

on:
  release:
    branches: [main]
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      # use fetch --all for setuptools_scm to work
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: python -m pip install --upgrade pip twine
    - name: Build wheel
      run: python -m pip wheel -w dist --no-deps .
    - name: Check distribution
      run: twine check dist/*
    - name: Attest build provenance
      uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.3.0
      with:
        subject-path: dist/*
    - name: Publish package (to TestPyPI)
      if: github.event_name == 'workflow_dispatch' && github.repository == 'devops-maturity/devops-maturity'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
      run: twine upload --repository testpypi dist/*
    - name: Publish package (to PyPI)
      if: github.event_name != 'workflow_dispatch' && github.repository == 'devops-maturity/devops-maturity'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
