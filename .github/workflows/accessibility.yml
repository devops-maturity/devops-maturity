name: Accessibility Testing

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  accessibility:
    name: Pa11y Accessibility Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start web application
        run: |
          uvicorn src.web.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for app to start..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/ > /dev/null; do sleep 1; done' \
            || { echo "ERROR: application failed to start within 60 seconds"; exit 1; }
          echo "App is ready!"

      - name: Run pa11y-ci accessibility tests
        run: pa11y-ci --config .pa11yci
