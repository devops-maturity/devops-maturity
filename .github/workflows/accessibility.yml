name: Accessibility Testing

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  accessibility:
    name: Pa11y Accessibility Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903  # v6.0.0
        with:
          node-version: '20'

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: '3.12'

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start web application
        run: |
          uvicorn src.web.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for app to start..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/ > /dev/null; do sleep 1; done' \
            || { echo "ERROR: application failed to start within 60 seconds"; exit 1; }
          echo "App is ready!"

      - name: Run pa11y-ci accessibility tests
        run: pa11y-ci --config .pa11yci
