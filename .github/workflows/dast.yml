name: DAST

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start web application
        run: |
          uvicorn src.web.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for app to start..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/ > /dev/null; do sleep 1; done'
          echo "App is ready!"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: 'http://localhost:8000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap-baseline-report'
          cmd_options: '-I'
